services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: biteplate
      POSTGRES_PASSWORD: biteplate
      POSTGRES_DB: biteplate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biteplate"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  web:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      DATABASE_URL: postgresql+psycopg://biteplate:biteplate@postgres:5432/biteplate
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: redis://redis:6379/1
      RESULT_BACKEND: redis://redis:6379/2
      SECRET_KEY: change-me-in-prod
      RUN_MIGRATIONS: "1"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    command: celery -A app.infra.tasks.celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg://biteplate:biteplate@postgres:5432/biteplate
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: redis://redis:6379/1
      RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  rabbitmq:
    profiles: ["rabbitmq"]
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  flower:
    profiles: ["monitoring"]
    build:
      context: ./backend
    command: celery -A app.infra.tasks.celery_app flower --port=5555
    environment:
      BROKER_URL: redis://redis:6379/1
      RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  adminer:
    profiles: ["monitoring"]
    image: adminer
    ports:
      - "8080:8080"

volumes:
  pgdata:
